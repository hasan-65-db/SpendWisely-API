

services:

  web:

    build: .

    ports:
      - "8000:8000"

    volumes:
      - .:/app

    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/spend_wisely_db
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0

    depends_on:
      - db
      - redis

  worker:
       
    build: .
    command: celery -A worker.celery_app worker --loglevel=info
    volumes:
      - .:/app

    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/spend_wisely_db
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0

    env_file:
      - .env
    depends_on:
      - db
      - redis
      - web

  db:
    image: postgres:15
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=spend_wisely_db
    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
       - "6379:6379"

volumes:
  postgres_data:
  
  